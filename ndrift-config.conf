[ndrift]
# Monitored directories for recursive scanning.
# Use comma separated absolute paths. Keep baseline and key paths outside these roots.
# Example: /var/www/html,/home/site/public_html
directories =

# Include rules for files that should be scanned.
# Rules accept file globs and are matched by file name and relative path.
# Use focused patterns to reduce scan time and alert noise.
include_patterns = *.php,*.js,*.html,*.css

# Exclude rules for directories or files that should be ignored.
# Directory style values end with /. File style values can be globs.
# Add cache and temporary paths here to lower noise and CPU usage.
exclude_patterns = cache/,logs/,uploads/tmp/,.git/

# Baseline and signing settings
# Baseline JSON path used as the trusted reference for file state.
# Store in a protected location outside monitored directories.
# Default path: /var/lib/ndrift/ndrift-baseline.json
baseline_path = /var/lib/ndrift/ndrift-baseline.json
# Detached signature file for baseline integrity verification.
# If signature verification fails, scans should fail loudly and return error code 2.
# Default path: /var/lib/ndrift/ndrift-baseline.json.sig
signature_path = /var/lib/ndrift/ndrift-baseline.json.sig
# Secret key used for baseline signing.
# Protect with strict file mode and ownership. Recommended mode is 600.
# Default path: /var/lib/ndrift/ndrift-baseline.key
signature_key_path = /var/lib/ndrift/ndrift-baseline.key

# State and report settings
# Audit and deployment state data.
# Keep writable only by the account that runs ndrift.
# Default path: /var/lib/ndrift/ndrift-state.json
state_path = /var/lib/ndrift/ndrift-state.json
# Last scan report path used by the report command and automation jobs.
# This file is replaced each run and can be shipped to external systems.
# Default path: /var/lib/ndrift/ndrift-report.json
last_report_path = /var/lib/ndrift/ndrift-report.json

# Logging settings
# Main log file path with automatic rotation.
# Place this in a directory writable by the account that runs ndrift.
# Default path: /var/log/ndrift/ndrift.log
log_path = /var/log/ndrift/ndrift.log
# Maximum bytes per log file before rotation starts.
# Increase for environments that generate frequent findings.
log_max_bytes = 1048576
# Number of rotated log archives to keep.
# Higher values improve forensic history and use more disk space.
log_backup_count = 5

# Scan behavior and performance settings
# Symlink handling. false is safer and avoids escaping monitored roots through links.
# Set true only when you explicitly trust your filesystem link structure.
follow_symlinks = false
# Maximum file size in MB for content hashing.
# Files larger than this are recorded with a size limit marker instead of full hash.
max_file_size_mb = 50
# Hash optimization toggle.
# true reuses prior hash when size and mtime are unchanged, which reduces IO cost.
hash_on_metadata_change_only = true
# Delay in milliseconds between file checks.
# Use this to throttle scanning on shared hosts and reduce performance impact.
throttle_ms = 0

# Scheduler settings
# Cron expression used by the cron command helper output.
# Example shown runs every 5 minutes. Update to your desired schedule.
cron_schedule = */5 * * * *

# Alert integration settings
# Destination mailbox for alert notifications.
# Leave empty to disable email integration.
email_to =
# SMTP host used for email delivery.
# Use localhost for local relay, or set your mail gateway host.
smtp_host = localhost
# Slack incoming webhook URL for alert delivery.
# Leave empty to disable Slack integration.
slack_webhook =
# Object storage bucket name used for report upload.
# Requires valid CLI credentials and bucket write permissions.
s3_bucket =

# Error handling settings
# Read error policy.
# false is recommended for security: permission and read failures trigger error code 2.
# true allows partial scan completion when unreadable files are encountered.
allow_read_errors = false

# Baseline update behavior settings
# Scan baseline refresh policy.
# false keeps a fixed baseline until explicitly updated.
# true writes a new baseline after each scan so new changes are usually reported once.
# Use this only when you prefer reduced repeated alerts over strict change persistence.
scan_updates_baseline = false
